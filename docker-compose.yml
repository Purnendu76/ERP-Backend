name: erp-management

services:
  # PostgreSQL Database
  postgres_db:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: erp_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d erp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis_cache:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Notification Server
  notification_server:
    build:
      context: ../notification-server
      dockerfile: Dockerfile
    container_name: erp_notification_server
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ../notification-server/.env

volumes:
  postgres_data:
  redis_data: